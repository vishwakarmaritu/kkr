<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kolkata Knight Riders</title>
  <link rel="icon" type="webp" href="assets/images/favicon.webp">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <img src="assets/images/favicon.webp" alt="KKR Logo">
    </div>
    <div class="kkr">Kolkata Knight Riders</div>

    <button id="dark-mode-btn" class="simple-theme-toggle" aria-label="Toggle Theme">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </header>

  <main>
    <section id="hero" class="hero-banner">
      <div class="hero-text">
        <h1 class="kljr">KORBO LORBO JEETBO RE!</h1>
      </div>
    </section>

    <section id="squad" class="main-section">
      <header class="heading">
        <h2>ROSTER 2026</h2>
      </header>
      
      <div class="search-box">
        <input type="text" id="player-search" class="search-input" placeholder="SEARCH PLAYER NAME:">
      </div>


      <div class="filters" style="margin-bottom: 2rem;">
        <button class="btn active" data-filter="ALL">ALL PLAYERS</button>
        <button class="btn" data-filter="BATTER_WK">BATTERS / W-K</button>
        <button class="btn" data-filter="ALL-ROUNDER">ALL-ROUNDERS</button>
        <button class="btn" data-filter="BOWLER">BOWLERS</button>
      </div>
      
      <div class="players-wrapper" id="players-list">
      </div>
      
      <button id="download-csv" class="btn alt-btn" style="margin-top: 2rem;">EXPORT ROSTER DATA (.CSV)</button>
    </section>

    <section id="hall-of-fame" class="main-section solid-bg">
      <header class="heading inverse">
        <h2>HALL OF FAME</h2>
      </header>
      <div class="players-wrapper" id="hof-grid">
        </div>
    </section>

    <section id="history" class="main-section">
      <header class="heading">
        <h2>GREATEST VICTORIES</h2>
      </header>
      <div class="timeline-wrapper" id="timeline-box">
        </div>
    </section>

    <section id="stadium" class="main-section">
      <header class="heading">
        <h2>FORTRESS: EDEN GARDENS</h2>
      </header>
      
      <div class="eden-marquee-container">
        <div class="eden-marquee-track">
          <img src="assets/images/eden1.jpg" alt="Eden Gardens">
          <img src="assets/images/eden2.jpg" alt="Eden Gardens">
          <img src="assets/images/eden3.jpg" alt="Eden Gardens">

          <img src="assets/images/eden1.jpg" alt="Eden Gardens">
          <img src="assets/images/eden2.jpg" alt="Eden Gardens">
          <img src="assets/images/eden3.jpg" alt="Eden Gardens">
          </div>
        </div>
      <div class="stadium-grid">
        <div class="stat-item">
          <h3>CAPACITY</h3>
          <p class="massive-text">68,000</p>
        </div>
        <div class="stat-item">
          <h3>LOCATION</h3>
          <p class="massive-text">KOLKATA</p>
        </div>
        <div class="stat-item">
          <h3>RECORD TEAM TOTAL</h3>
          <p class="massive-text">272/7</p>
        </div>
      </div>
    </section>

    <section id="quiz-area" class="main-section">
      <header class="heading">
        <h2>IS TOMAR ROKTE KKR?</h2>
      </header>
      <div class="quiz-box" id="quiz-wrapper">
        <button class="btn" id="start-btn">START QUIZ</button>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
