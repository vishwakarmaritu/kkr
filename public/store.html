<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KKR OFFICIAL STORE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="main-header" style="background-color: var(--primary); padding: 1rem 2rem; border-bottom: 4px solid var(--text-color); display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
  <div style="width: 50px;"></div>
  
  <h1 style="color: var(--secondary); font-family: var(--font-heading); font-size: 2.5rem; text-shadow: 3px 3px 0px #000; letter-spacing: 2px; text-transform: uppercase; margin: 0;">
    KKR OFFICIAL STORE
  </h1>
  
  <div class="nav-actions" style="display: flex; gap: 1.5rem; align-items: center;">
    <a href="index.html" class="cart-icon-link" style="text-decoration: none; font-size: 1.5rem; color: var(--secondary);">🏠</a>
  </div>
</header>

  <main style="display: flex; flex-direction: column; gap: 4rem; padding: 0 2rem; max-width: 1400px; margin: 0 auto;">
    <section id="products-grid" style="width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;">
    </section>

    <aside class="cart-box" style="width: 100%; max-width: 600px; margin: 0 auto; background: var(--bg-color); border: 4px solid var(--text-color); box-shadow: 12px 12px 0px var(--primary); padding: 2rem;">
      <h3 style="font-family: var(--font-heading); font-size: 1.8rem; border-bottom: 4px solid var(--text-color); padding-bottom: 0.5rem; margin-bottom: 1rem;">YOUR CART</h3>
      
      <div id="cart-items" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
      </div>
      
      <div style="font-family: var(--font-heading); font-size: 1.5rem; display: flex; justify-content: space-between; border-top: 4px dashed var(--text-color); padding-top: 1rem;">
        <span>TOTAL:</span>
        <span id="cart-total" style="color: var(--secondary); -webkit-text-stroke: 1px #000;">₹0</span>
      </div>

      <button onclick="openCheckout()" class="btn alt-btn" style="width: 100%; margin-top: 1.5rem; font-size: 1.2rem;">PROCEED TO CHECKOUT</button>
    </aside>
  </main>

  <div id="checkout-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center;">
    <div style="background: var(--bg-color); border: 4px solid var(--text-color); padding: 2rem; max-width: 500px; width: 100%; box-shadow: 12px 12px 0px var(--secondary);">
      
      <div id="checkout-form-step">
        <h2 style="font-family: var(--font-heading); margin-bottom: 1rem;">DELIVERY DETAILS</h2>
        <input type="text" id="cName" placeholder="FULL NAME" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 3px solid var(--text-color); font-family: var(--font-body); font-weight: bold;">
        <input type="text" id="cPhone" placeholder="PHONE NUMBER" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 3px solid var(--text-color); font-family: var(--font-body); font-weight: bold;">
        <textarea id="cAddress" placeholder="FULL ADDRESS" rows="3" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 3px solid var(--text-color); font-family: var(--font-body); font-weight: bold;"></textarea>
        <div style="display: flex; gap: 1rem;">
          <button onclick="closeCheckout()" class="btn" style="flex: 1;">CANCEL</button>
          <button onclick="showPaymentStep()" class="btn alt-btn" style="flex: 1;">PROCEED TO PAY</button>
        </div>
      </div>

      <div id="checkout-payment-step" style="display: none; text-align: center;">
        <h2 style="font-family: var(--font-heading); margin-bottom: 1rem;">SCAN TO PAY: <span id="pay-amount" style="color: var(--secondary); -webkit-text-stroke: 1px #000;"></span></h2>
        <div style="background: var(--text-color); color: var(--bg-color); padding: 1rem; margin-bottom: 1.5rem; text-align: left; font-family: var(--font-body); font-weight: bold;">
          <h3 style="font-family: var(--font-heading); margin-bottom: 0.5rem; color: var(--secondary);">ORDER SUMMARY</h3>
          <ul id="checkout-summary-list" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem;">
          </ul>
        </div>
        <img src="assets/images/rickroll.jpg" alt="QR Code" style="width: 150px; height: 150px; border: 4px solid var(--text-color); margin: 0 auto 1.5rem auto; display: block;">
        <button onclick="submitOrder()" class="btn alt-btn" style="width: 100%; font-size: 1.5rem;">COMPLETE ORDER</button>
      </div>

    </div>
  </div>

  <script src="store.js"></script>
</body>
</html>
